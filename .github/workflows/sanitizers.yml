name: Sanitizers

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan
            flags: "-fsanitize=address -fno-omit-frame-pointer"
            link: "-fsanitize=address"
          - name: ubsan
            flags: "-fsanitize=undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            link: "-fsanitize=undefined"
          - name: tsan
            flags: "-fsanitize=thread -fno-omit-frame-pointer"
            link: "-fsanitize=thread"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y ninja-build g++-14 ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.name }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.name }}-

      - name: Configure
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          ccache --zero-stats
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.link }}"

      - name: Build
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          cmake --build build
          ccache --show-stats

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure
