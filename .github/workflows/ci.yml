name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  linux:
    name: linux-${{ matrix.compiler.cc }}-${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        compiler:
          - { cc: gcc-14, cxx: g++-14 }
          - { cc: clang,  cxx: clang++ }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build g++-14 clang

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos:
    name: macos-${{ matrix.build_type }}
    # Pinned to the Intel runner: the vendored Catch2 v2 header emits an x86
    # "int $3" trap in CATCH_TRAP that does not assemble on Apple Silicon
    # (macos-latest is arm64). Upgrading Catch2 would let this move to macos-latest.
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows:
    name: windows-msvc${{ matrix.toolset }}-${{ matrix.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        # 14.29 == VS2019 (v142), 14.44 == VS2022 (v143).
        # VS2015 (14.0) is intentionally omitted: float_tools requires C++17,
        # which is unavailable before VS2017.
        arch: [x86, x64]
        toolset: ["14.29", "14.44"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
          toolset: ${{ matrix.toolset }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
